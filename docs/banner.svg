<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88" />
      <stop offset="35%" style="stop-color:#00ccff" />
      <stop offset="70%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a855f7" />
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88" />
      <stop offset="100%" style="stop-color:#00ccff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse1 {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes pulse2 {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes wave1 {
      0% { transform: translateX(0); }
      100% { transform: translateX(-200px); }
    }
    @keyframes wave2 {
      0% { transform: translateX(0); }
      100% { transform: translateX(-160px); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes dashFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes nodeGlow {
      0%, 100% { r: 4; opacity: 0.6; }
      50% { r: 6; opacity: 1; }
    }
    .wave-line-1 { animation: wave1 3s linear infinite; }
    .wave-line-2 { animation: wave2 4s linear infinite; }
    .pulse-circle { animation: pulse1 2s ease-in-out infinite; }
    .pulse-circle-2 { animation: pulse2 2.5s ease-in-out infinite; }
    .arrow-flow { animation: arrowPulse 1.5s ease-in-out infinite; }
    .dash-flow { animation: dashFlow 1s linear infinite; stroke-dasharray: 10 10; }
    .node-pulse { animation: nodeGlow 2s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12" />
  <rect width="800" height="200" fill="none" stroke="#1a1a2e" stroke-width="1" rx="12" />

  <!-- Brain wave patterns (left side) -->
  <g transform="translate(30, 60)" clip-path="url(#waveClip)">
    <clipPath id="waveClip">
      <rect x="0" y="-30" width="180" height="80" />
    </clipPath>
    <!-- Wave 1 - Attention signal -->
    <g class="wave-line-1">
      <path d="M0,10 Q10,-15 20,10 Q30,35 40,10 Q50,-15 60,10 Q70,35 80,10 Q90,-15 100,10 Q110,35 120,10 Q130,-15 140,10 Q150,35 160,10 Q170,-15 180,10 Q190,35 200,10 Q210,-15 220,10 Q230,35 240,10 Q250,-15 260,10 Q270,35 280,10 Q290,-15 300,10 Q310,35 320,10 Q330,-15 340,10 Q350,35 360,10 Q370,-15 380,10"
            fill="none" stroke="url(#waveGrad1)" stroke-width="2" filter="url(#glow)" />
    </g>
    <!-- Wave 2 - Engagement signal -->
    <g class="wave-line-2">
      <path d="M0,25 Q15,5 30,25 Q45,45 60,25 Q75,5 90,25 Q105,45 120,25 Q135,5 150,25 Q165,45 180,25 Q195,5 210,25 Q225,45 240,25 Q255,5 270,25 Q285,45 300,25 Q315,5 330,25 Q345,45 360,25"
            fill="none" stroke="url(#waveGrad2)" stroke-width="1.5" filter="url(#glow)" />
    </g>
  </g>

  <!-- Brain icon (stylized neural nodes) -->
  <g transform="translate(70, 120)">
    <circle cx="0" cy="0" r="5" fill="#00ff88" class="node-pulse" filter="url(#glow)" />
    <circle cx="20" cy="-15" r="4" fill="#00ccff" class="pulse-circle" filter="url(#glow)" />
    <circle cx="25" cy="10" r="3.5" fill="#8b5cf6" class="pulse-circle-2" filter="url(#glow)" />
    <circle cx="-15" cy="-10" r="3" fill="#a855f7" class="pulse-circle" filter="url(#glow)" />
    <circle cx="40" cy="-5" r="4" fill="#00ff88" class="pulse-circle-2" filter="url(#glow)" />
    <!-- Connections -->
    <line x1="0" y1="0" x2="20" y2="-15" stroke="#00ccff" stroke-width="0.8" opacity="0.4" class="dash-flow" />
    <line x1="0" y1="0" x2="25" y2="10" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4" class="dash-flow" />
    <line x1="0" y1="0" x2="-15" y2="-10" stroke="#a855f7" stroke-width="0.8" opacity="0.4" class="dash-flow" />
    <line x1="20" y1="-15" x2="40" y2="-5" stroke="#00ff88" stroke-width="0.8" opacity="0.4" class="dash-flow" />
    <line x1="25" y1="10" x2="40" y2="-5" stroke="#00ccff" stroke-width="0.8" opacity="0.4" class="dash-flow" />
  </g>

  <!-- Flow arrow -->
  <g class="arrow-flow" transform="translate(160, 100)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#arrowGrad)" stroke-width="2" filter="url(#glow)" />
    <polygon points="60,-5 70,0 60,5" fill="#00ccff" filter="url(#glow)" />
  </g>

  <!-- Title -->
  <text x="280" y="82" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#titleGrad)" filter="url(#glowStrong)">Neural Reputation Oracle</text>

  <!-- Tagline -->
  <text x="280" y="112" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#8892b0" letter-spacing="0.5">Measuring trust with brainwaves.</text>

  <!-- Trust Score badge (right side) -->
  <g transform="translate(640, 130)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="none" stroke="#00ff88" stroke-width="1.5" class="pulse-circle" />
    <text x="60" y="23" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#00ff88" font-weight="600">Trust Score</text>
  </g>

  <!-- Stats -->
  <g transform="translate(280, 145)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <text x="40" y="15" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#58a6ff">10 tests</text>
  </g>
  <g transform="translate(370, 145)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <text x="45" y="15" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8b5cf6">3 contracts</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="750" cy="30" r="2" fill="#00ff88" opacity="0.3" class="pulse-circle" />
  <circle cx="770" cy="50" r="1.5" fill="#00ccff" opacity="0.2" class="pulse-circle-2" />
  <circle cx="730" cy="45" r="1" fill="#8b5cf6" opacity="0.3" class="pulse-circle" />
  <circle cx="30" cy="30" r="1.5" fill="#a855f7" opacity="0.2" class="pulse-circle-2" />
  <circle cx="50" cy="180" r="2" fill="#00ff88" opacity="0.2" class="pulse-circle" />
</svg>